# Nginx config for Astro standalone + PM2
#
# Assumptions:
# - domain: rsh.pw
# - app root: /home/debian/rsh.pw
# - Astro standalone server listens on 127.0.0.1:4321
# - static client assets are in /home/debian/rsh.pw/dist/client
# - TLS certificates are managed by Let's Encrypt
#
# If you are not behind Cloudflare, remove the `set_real_ip_from` lines and
# `real_ip_header CF-Connecting-IP`.

upstream rsh_backend {
    server 127.0.0.1:4321;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name rsh.pw www.rsh.pw;

    # LetsEncrypt HTTP challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://rsh.pw$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rsh.pw;

    ssl_certificate /etc/letsencrypt/live/rsh.pw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rsh.pw/privkey.pem;

    return 301 https://rsh.pw$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rsh.pw;

    root /home/debian/rsh.pw/dist/client;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/rsh.pw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rsh.pw/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    error_log /var/log/nginx/rsh.pw-error.log warn;
    access_log /var/log/nginx/rsh.pw-access.log combined;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf
        application/vnd.ms-fontobject;

    # ACME challenge on HTTPS too
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Astro/Vite hashed assets
    location ^~ /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Common static assets
    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|avif|woff|woff2|ttf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri @app;
    }

    location = /favicon.svg {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /robots.txt {
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri @app;
    }

    location = /sitemap-index.xml {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri @app;
    }

    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_http_version 1.1;
        proxy_pass http://rsh_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
